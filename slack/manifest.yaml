_metadata:
  major_version: 1
  minor_version: 1

display_information:
  name: Slack LMS
  description: Learning management bot backed by Apps Script + Sheets
  background_color: "#2C2D30"

features:
  bot_user:
    display_name: Slack LMS
    always_online: false
  slash_commands:
    - command: /learn
      description: Open learning actions and quick-start options
      should_escape: false
    - command: /progress
      description: View learner progress and upcoming lessons
      should_escape: false
    - command: /lesson
      description: Show current lesson details and actions
      should_escape: false
    - command: /complete
      description: Mark current lesson complete
      should_escape: false
    - command: /onboard
      description: Admin onboarding workflow for learners/cohorts
      should_escape: false
    - command: /admin
      description: Open administrative controls
      should_escape: false
    - command: /cohort
      description: Cohort operations (start/pause/resume/report)
      should_escape: false
    - command: /resend
      description: Resend lesson/reminder delivery
      should_escape: false

oauth_config:
  redirect_urls:
    # OPERATOR ACTION REQUIRED: replace with your OAuth redirect URL(s).
    - https://REPLACE_WITH_APPS_SCRIPT_REDIRECT_URL
  scopes:
    bot:
      - chat:write
      - commands
      - im:write
      - users:read
      # Optional: uncomment if email lookups are required.
      # - users:read.email

settings:
  interactivity:
    is_enabled: true
    # OPERATOR ACTION REQUIRED: replace with your deployed Apps Script Web App URL.
    request_url: https://REPLACE_WITH_APPS_SCRIPT_WEB_APP_URL/exec
  event_subscriptions:
    # OPERATOR ACTION REQUIRED: enable and set if Events API is used.
    request_url: https://REPLACE_WITH_APPS_SCRIPT_WEB_APP_URL/exec
    bot_events: []
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
